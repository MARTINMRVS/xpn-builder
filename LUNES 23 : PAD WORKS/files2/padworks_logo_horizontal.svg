<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400">
  <rect width="1280" height="400" fill="#0D0F14"/>
  <rect x="0" y="0" width="1280" height="6" fill="#C8A96E"/>

  <!-- Dot grid -->
  <circle cx="160" cy="150" r="22" fill="#C8A96E"/>
  <circle cx="220" cy="150" r="22" fill="#C8A96E" opacity="0.65"/>
  <circle cx="280" cy="150" r="22" fill="#C8A96E" opacity="0.25"/>
  <circle cx="160" cy="210" r="22" fill="#C8A96E" opacity="0.65"/>
  <circle cx="220" cy="210" r="22" fill="#C8A96E"/>
  <circle cx="280" cy="210" r="22" fill="#C8A96E" opacity="0.45"/>
  <circle cx="160" cy="270" r="22" fill="#C8A96E" opacity="0.25"/>
  <circle cx="220" cy="270" r="22" fill="#C8A96E" opacity="0.45"/>
  <circle cx="280" cy="270" r="22" fill="#C8A96E" opacity="0.12"/>

  <!-- Divider -->
  <line x1="340" y1="130" x2="340" y2="290" stroke="#C8A96E" stroke-width="1" opacity="0.3"/>

  <!-- PAD white bold -->
  <text x="380" y="210" font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="700" fill="#FFFFFF" letter-spacing="8">PAD</text>
  <!-- WORKS gold light -->
  <text x="380" y="305" font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="300" fill="#C8A96E" letter-spacing="8">WORKS</text>
